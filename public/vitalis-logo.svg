<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1426"/>
      <stop offset="100%" style="stop-color:#0F1D32"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14B8A6"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="48" fill="url(#bg)"/>

  <!-- Subtle glow behind pulse -->
  <ellipse cx="200" cy="195" rx="140" ry="60" fill="url(#glow)"/>

  <!-- Heartbeat / Pulse line -->
  <polyline
    points="40,210 110,210 135,210 155,170 175,260 200,140 225,280 245,180 265,210 290,210 360,210"
    fill="none"
    stroke="url(#pulse)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- VITALIS text -->
  <text x="200" y="320" text-anchor="middle" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="52" font-weight="700" letter-spacing="8" fill="#FFFFFF">VITALIS</text>

  <!-- Subtle tagline -->
  <text x="200" y="352" text-anchor="middle" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="400" letter-spacing="3" fill="#14B8A6" opacity="0.8">PROJECT HEALTH</text>
</svg>
